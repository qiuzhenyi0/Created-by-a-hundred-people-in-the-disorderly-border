<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Liminal Veil - Project Zero</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; padding: 25px; pointer-events: none; }
        .btn { 
            pointer-events: auto; padding: 12px 20px; border-radius: 2px; 
            border: 1px solid #00ffdc; background: rgba(0,0,0,0.8); 
            color: #00ffdc; font-family: monospace; cursor: pointer; font-size: 14px;
        }
        #start-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00ffdc; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: monospace; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start-mask" onclick="startSystem()">
        <div style="font-size: 24px; margin-bottom: 20px;">[ PROJECT ZERO ]</div>
        <div class="btn">INITIALIZE SYSTEM</div>
    </div>

    <div id="ui-layer">
        <button class="btn" onclick="toggleMode()">MODE_SWITCH</button>
        <div id="status" style="color: white; font-family: monospace; margin-top: 10px; font-size: 16px;">[ SYSTEM_IDLE ]</div>
    </div>

    <script>
        let mode = 1; // 1: 文字, 0: 玫瑰
        let video;
        let particles = [];
        let targets = [];
        const numParticles = 1000;
        let handX = 0, handY = 0, isFist = false, isHandVisible = false;
        let started = false;

        function startSystem() {
            document.getElementById('start-mask').style.display = 'none';
            userStartAudio(); // 確保音訊/錄影權限啟動
            started = true;
            if (video) video.loop();
        }

        function toggleMode() {
            mode = 1 - mode;
            createTargets();
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            video = createCapture(VIDEO);
            video.size(640, 480);
            video.hide();
            
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
            initMediaPipe();
            createTargets();
        }

        function createTargets() {
            targets = [];
            let pg = createGraphics(width, height);
            pg.background(0);
            pg.fill(255);
            pg.textAlign(CENTER, CENTER);
            
            if (mode === 1) {
                pg.textSize(width * 0.1);
                pg.text("The Liminal Veil", width/2, height/2);
            } else {
                pg.translate(width/2, height/2);
                for (let a = 0; a < TWO_PI; a += 0.01) {
                    let r = width * 0.012;
                    let x = r * 16 * pow(sin(a), 3);
                    let y = -r * (13 * cos(a) - 5 * cos(2*a) - 2 * cos(3*a) - cos(4*a));
                    pg.rect(x, y, 2, 2);
                }
            }

            pg.loadPixels();
            let coords = [];
            for (let x = 0; x < pg.width; x += 5) {
                for (let y = 0; y < pg.height; y += 5) {
                    let i = (x + y * pg.width) * 4;
                    if (pg.pixels[i] > 128) coords.push(createVector(x, y));
                }
            }
            for (let i = 0; i < numParticles; i++) {
                targets[i] = coords[i % coords.length] || createVector(random(width), random(height));
            }
            pg.remove();
        }

        function draw() {
            if (!started) return;
            background(0);

            // 背景影片層
            push();
            translate(width, 0); scale(-1, 1);
            tint(255, 80);
            image(video, 0, 0, width, height);
            pop();

            document.getElementById('status').innerText = isFist ? "[ STATUS: CONVERGING ]" : "[ STATUS: DISORDERLY ]";

            // 粒子繪製核心
            // 使用 drawingContext 增加發光感 (模擬圖1)
            drawingContext.shadowBlur = 10;
            drawingContext.shadowColor = mode === 1 ? '#00ffdc' : '#ff4d6d';

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                if (isHandVisible) {
                    if (isFist) p.applyForce(p.arrive(targets[i])); // 握拳匯聚
                    else p.applyForce(p.flee(createVector(handX, handY))); // 張手逃逸
                } else {
                    p.wander();
                }
                p.update();
                p.show();
            }
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = p5.Vector.random2D();
                this.acc = createVector(0, 0);
                this.maxSpeed = 10;
                this.maxForce = 0.6;
            }

            applyForce(f) { this.acc.add(f); }

            arrive(target) {
                let desired = p5.Vector.sub(target, this.pos);
                let d = desired.mag();
                let speed = d < 100 ? map(d, 0, 100, 0, this.maxSpeed) : this.maxSpeed;
                desired.setMag(speed);
                let steer = p5.Vector.sub(desired, this.vel);
                return steer.limit(this.maxForce);
            }

            flee(target) {
                let desired = p5.Vector.sub(this.pos, target);
                if (desired.mag() < 120) {
                    desired.setMag(this.maxSpeed);
                    let steer = p5.Vector.sub(desired, this.vel);
                    return steer.limit(this.maxForce * 1.5);
                }
                return createVector(0, 0);
            }

            wander() {
                this.acc.add(p5.Vector.random2D().mult(0.1));
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);
                this.vel.mult(0.92);
            }

            show() {
                noStroke();
                fill(mode === 1 ? '#00ffdc' : '#ff4d6d');
                if (mode === 1) rect(this.pos.x, this.pos.y, 2.5, 2.5);
                else ellipse(this.pos.x, this.pos.y, 3.5);
            }
        }

        function initMediaPipe() {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            hands.onResults(results => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    isHandVisible = true;
                    let lm = results.multiHandLandmarks[0];
                    handX = (1 - lm[0].x) * width;
                    handY = lm[0].y * height;
                    // 偵測握拳：食指尖到手腕距離
                    isFist = dist(lm[8].x, lm[8].y, lm[0].x, lm[0].y) < 0.12;
                } else {
                    isHandVisible = false;
                    isFist = false;
                }
            });
            const camera = new Camera(video.elt, {
                onFrame: async () => { if (started) await hands.send({image: video.elt}); },
                width: 640, height: 480
            });
            camera.start();
        }
        function windowResized() { resizeCanvas(windowWidth, windowHeight); createTargets(); }
    </script>
</body>
</html>
