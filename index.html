<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Liminal Veil - Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; padding: 25px; pointer-events: none; }
        .btn { 
            pointer-events: auto; padding: 10px 20px; border-radius: 5px; 
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); 
            color: white; font-family: monospace; cursor: pointer;
        }
        #mode-text { margin-top: 15px; color: white; font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button class="btn" onclick="toggleMode()">SYSTEM_TOGGLE</button>
        <div id="mode-text">INITIALIZING...</div>
    </div>

    <script>
        let mode = 0; // 0: 玫瑰, 1: 失序邊境
        let video;
        let particles = [];
        let targets = [];
        const numParticles = 1200; // 增加數量讓字體清晰
        let handX = 0, handY = 0, isFist = false, isHandVisible = false;

        function toggleMode() {
            mode = (mode + 1) % 2;
            createTargets(); // 切換模式時重新計算目標點
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            video = createCapture(VIDEO);
            video.size(320, 240);
            video.hide();
            
            initMediaPipe();
            
            // 初始化粒子
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
            createTargets();
        }

        // 核心：創建形狀/文字的目標座標
        function createTargets() {
            targets = [];
            let pg = createGraphics(width, height);
            pg.pixelDensity(1);
            pg.background(0);
            pg.fill(255);
            pg.textAlign(CENTER, CENTER);
            
            if (mode === 1) {
                // 失序邊境：文字模式
                pg.textSize(width * 0.08);
                pg.textFont('monospace');
                pg.text("The Liminal Veil", width/2, height/2);
            } else {
                // 玫瑰模式：心形/花朵
                pg.translate(width/2, height/2);
                pg.beginShape();
                for (let a = 0; a < TWO_PI; a += 0.01) {
                    let r = width * 0.015;
                    let x = r * 16 * pow(sin(a), 3);
                    let y = -r * (13 * cos(a) - 5 * cos(2*a) - 2 * cos(3*a) - cos(4*a));
                    pg.vertex(x, y);
                }
                pg.endShape(CLOSE);
            }

            pg.loadPixels();
            // 從畫布中提取白色像素點作為目標
            let coords = [];
            for (let x = 0; x < pg.width; x += 4) {
                for (let y = 0; y < pg.height; y += 4) {
                    let index = (x + y * pg.width) * 4;
                    if (pg.pixels[index] > 128) {
                        coords.push(createVector(x, y));
                    }
                }
            }

            // 將提取出的座標分配給粒子
            for (let i = 0; i < numParticles; i++) {
                targets[i] = coords[i % coords.length] || createVector(random(width), random(height));
            }
            pg.remove();
        }

        function draw() {
            background(0);

            // 背景影片
            push();
            translate(width, 0); scale(-1, 1);
            tint(255, 120); // 增加透明度
            image(video, 0, 0, width, height);
            pop();

            document.getElementById('mode-text').innerText = mode === 0 ? "⊹ ROSE_PATTERN ⊹" : "𖥔 THE_LIMINAL_VEIL 𖥔";

            // 粒子邏輯
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                let t = targets[i];

                if (isHandVisible && isFist) {
                    p.follow(t); // 握拳時：匯聚成形
                } else if (isHandVisible && !isFist) {
                    p.flee(createVector(handX, handY)); // 張手時：繞過手掌
                } else {
                    p.wander(); // 無手時：自由漂浮
                }
                
                p.update();
                p.show();
            }
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = p5.Vector.random2D();
                this.acc = createVector(0, 0);
                this.maxSpeed = 12;
                this.maxForce = 0.8;
            }

            follow(target) {
                let force = p5.Vector.sub(target, this.pos);
                let d = force.mag();
                let speed = this.maxSpeed;
                if (d < 100) speed = map(d, 0, 100, 0, this.maxSpeed);
                force.setMag(speed);
                let steer = p5.Vector.sub(force, this.vel);
                steer.limit(this.maxForce);
                this.acc.add(steer);
            }

            flee(target) {
                let force = p5.Vector.sub(this.pos, target);
                if (force.mag() < 150) {
                    force.setMag(this.maxSpeed);
                    let steer = p5.Vector.sub(force, this.vel);
                    steer.limit(this.maxForce * 2);
                    this.acc.add(steer);
                }
            }

            wander() {
                this.acc.add(p5.Vector.random2D().mult(0.2));
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);
                this.vel.mult(0.95); // 增加摩擦力，讓字體更穩
            }

            show() {
                noStroke();
                if (mode === 1) {
                    fill(0, 255, 220, 200); // 青色 (失序邊境)
                    rect(this.pos.x, this.pos.y, 2, 2);
                } else {
                    fill(255, 100, 130, 200); // 粉紅 (玫瑰)
                    ellipse(this.pos.x, this.pos.y, 3);
                }
            }
        }

        function initMediaPipe() {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            hands.onResults(results => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    isHandVisible = true;
                    let wrist = results.multiHandLandmarks[0][0];
                    let index = results.multiHandLandmarks[0][8];
                    handX = (1 - wrist.x) * width;
                    handY = wrist.y * height;
                    isFist = dist(wrist.x, wrist.y, index.x, index.y) < 0.12;
                } else {
                    isHandVisible = false;
                }
            });
            const camera = new Camera(video.elt, { onFrame: async () => { await hands.send({image: video.elt}); } });
            camera.start();
        }

        function windowResized() { resizeCanvas(windowWidth, windowHeight); createTargets(); }
    </script>
</body>
</html>
