<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>玫瑰與失序邊境</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; padding: 20px; pointer-events: none; }
        .btn { 
            pointer-events: auto; padding: 12px 24px; border-radius: 25px; 
            border: none; background: rgba(255,255,255,0.85); font-weight: bold; font-size: 16px;
        }
        #mode-text { margin-top: 10px; color: white; font-family: monospace; font-size: 18px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: monospace; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button class="btn" onclick="toggleMode()">切換模式 / Switch Mode</button>
        <div id="mode-text">正在開啟攝影機...</div>
    </div>
    <div id="loading">模型載入中，請稍候...</div>

    <script>
        let mode = 0; // 0: 玫瑰, 1: 失序邊境
        let video;
        let particles = [];
        let handX = 0, handY = 0;
        let isFist = false;
        let isHandVisible = false;

        // 模式文字
        const textRose = "⊹ 玫瑰紋樣 ⊹\n⣤⣶⠿⢖⣢⣴⣶⣦...";
        const textLiminal = "失序邊境 .𖥔 ݁˖\n𝕋𝕙𝕖 𝕃𝕚𝕞𝕚𝕟𝕒𝕝 𝕍𝕖𝕚𝕝.⋆";

        function toggleMode() {
            mode = (mode + 1) % 2;
            document.getElementById('mode-text').innerText = (mode === 0) ? textRose : textLiminal;
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            
            // 使用 p5.js 內建方法開啟攝影機 (這在手機上最穩定)
            video = createCapture(VIDEO, function() {
                document.getElementById('mode-text').innerText = (mode === 0) ? textRose : textLiminal;
                initMediaPipe(); // 攝影機準備好後，才啟動手勢辨識
            });
            video.size(320, 240);
            video.hide(); // 隱藏原生影片元素，我們要在畫布上自己畫
        }

        // 初始化 MediaPipe
        function initMediaPipe() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            
            hands.onResults((results) => {
                document.getElementById('loading').style.display = 'none'; // 隱藏載入文字
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    isHandVisible = true;
                    let landmarks = results.multiHandLandmarks[0];
                    let wrist = landmarks[0];
                    let indexTip = landmarks[8];
                    
                    // 計算手心座標 (並做水平鏡像翻轉)
                    handX = (1 - wrist.x) * width;
                    handY = wrist.y * height;
                    
                    // 判斷握拳 (食指尖與手腕的距離小於 0.15)
                    let d = dist(indexTip.x, indexTip.y, wrist.x, wrist.y);
                    isFist = d < 0.15;
                } else {
                    isHandVisible = false;
                    isFist = false;
                }
            });

            // 建立一個持續將影像送入模型的迴圈
            async function predictFrame() {
                if (video.elt.readyState >= 2) {
                    await hands.send({ image: video.elt });
                }
                requestAnimationFrame(predictFrame);
            }
            predictFrame();
        }

        function draw() {
            background(0);

            // 1. 繪製攝影機背景 (水平鏡像)
            if (video.loadedmetadata) {
                push();
                translate(width, 0);
                scale(-1, 1);
                image(video, 0, 0, width, height);
                // 加上模式專屬濾鏡
                if (mode === 0) fill(150, 20, 50, 100); // 玫瑰暗紅遮罩
                else fill(0, 10, 20, 180); // 邊境深藍遮罩
                rect(0, 0, width, height);
                pop();
            }

            // 2. 隨時產生背景散亂粒子
            if (frameCount % 3 === 0) {
                particles.push(new Particle(random(width), random(height), mode, true));
            }

            // 3. 處理手勢互動
            if (isHandVisible && !isFist) {
                // 張開手時，從手心噴發粒子
                if (frameCount % 2 === 0) {
                    for(let i=0; i<3; i++) particles.push(new Particle(handX, handY, mode, false));
                }
            }

            // 4. 更新與繪製粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(isFist, handX, handY);
                particles[i].show();
                if (particles[i].finished()) {
                    particles.splice(i, 1);
                }
            }
        }

        // 粒子類別
        class Particle {
            constructor(x, y, m, isBackground) {
                this.x = x;
                this.y = y;
                this.mode = m;
                this.alpha = random(150, 255);
                this.size = m === 0 ? random(6, 15) : random(2, 6);
                
                // 背景粒子移動慢，手中噴發的粒子移動快
                let speed = isBackground ? 1 : 6;
                this.vx = random(-speed, speed);
                this.vy = random(-speed, speed);
                this.gravity = m === 0 ? random(0.02, 0.05) : 0;
            }

            finished() { return this.alpha <= 0 || this.size <= 0.5; }

            update(fistActive, tx, ty) {
                if (fistActive) {
                    // 握拳坍塌效果
                    this.x = lerp(this.x, tx, 0.15);
                    this.y = lerp(this.y, ty, 0.15);
                    this.size *= 0.95;
                    this.alpha -= 8;
                } else {
                    // 正常飄散
                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= (this.mode === 0 ? 3 : 5);
                }
            }

            show() {
                noStroke();
                if (this.mode === 0) {
                    fill(255, random(100, 180), random(120, 200), this.alpha); // 玫瑰粉紅色
                    ellipse(this.x, this.y, this.size);
                } else {
                    fill(0, 255, 255, this.alpha); // 邊境青色
                    rect(this.x, this.y, this.size, this.size);
                }
            }
        }

        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
    </script>
</body>
</html>
