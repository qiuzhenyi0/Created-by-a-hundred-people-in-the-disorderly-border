<!DOCTYPE html>

<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Gesture Particle Symphony</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { background: #000; overflow: hidden; width: 100%; height: 100%; }
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 10;
            padding: 16px 20px; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        #switch-btn {
            pointer-events: auto;
            padding: 10px 28px; border-radius: 30px; border: none;
            background: rgba(255,255,255,0.88);
            font-weight: 700; font-size: 15px; cursor: pointer;
            box-shadow: 0 2px 16px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
        }
        #mode-label {
            color: #fff; font-family: 'Courier New', monospace;
            font-size: 16px; text-shadow: 0 0 12px rgba(0,255,200,0.8);
            letter-spacing: 1px;
        }
        #gesture-hint {
            color: rgba(255,255,255,0.55); font-family: 'Courier New', monospace;
            font-size: 13px; font-style: italic;
        }
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: #fff; font-family: 'Courier New', monospace; gap: 16px;
        }
        #loading-overlay .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #0ff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="loading-overlay">
    <div class="spinner"></div>
    <div>模型載入中，請稍候…</div>
</div>

<div id="ui-layer">
    <button id="switch-btn" onclick="toggleMode()">切換模式 / Switch Mode</button>
    <div id="mode-label">⊹ 心型紋樣 Rose Pattern ⊹</div>
    <div id="gesture-hint">握拳聚合 &nbsp;|&nbsp; 張手散開</div>
</div>

<script>
// ─── Global State ────────────────────────────────────────────────
let mode = 0;           // 0 = rose / 1 = liminal
let video;
let particles = [];
const NUM_PARTICLES = 900;

let handX = 0, handY = 0;
let isFist = false;
let isHandVisible = false;

let roseTargets = [];
let liminalTargets = [];
let targetsReady = false;

// ─── Mode Labels ─────────────────────────────────────────────────
const MODE_INFO = [
    {
        label: "⊹ 心型紋樣 Rose Pattern ⊹",
        hint:  "握拳聚合 | 張手散開",
        bg:    [150, 20, 50, 110],
        glow:  [255, 150, 180],
        core:  [255,  80, 120]
    },
    {
        label: "失序邊境 .𖥔 ݁˖ The Liminal Veil .⋆",
        hint:  " 握拳凝字 |  張手逃散",
        bg:    [0, 8, 20, 170],
        glow:  [0, 255, 220],
        core:  [200, 255, 255]
    }
];

// ─── Toggle Mode ─────────────────────────────────────────────────
function toggleMode() {
    mode = (mode + 1) % 2;
    document.getElementById('mode-label').innerText = MODE_INFO[mode].label;
    document.getElementById('gesture-hint').innerText = MODE_INFO[mode].hint;
    respawnParticles();
}

// ─── p5 setup ────────────────────────────────────────────────────
function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(RGB);

    video = createCapture(VIDEO, () => {
        initMediaPipe();
    });
    video.size(320, 240);
    video.hide();
}

// ─── Generate target points ───────────────────────────────────────
function buildTargets() {
    roseTargets   = buildRoseTargets(NUM_PARTICLES);
    liminalTargets = buildLiminalTargets(NUM_PARTICLES);
    targetsReady = true;
    respawnParticles();
}

// Mode 0 – multi-petal rose using polar rose curve + heart overlay
function buildRoseTargets(n) {
    let pts = [];
    const cx = width / 2, cy = height / 2;

    // Rose curve (rhodonea) petals
    for (let i = 0; i < n * 0.6; i++) {
        let t = map(i, 0, n * 0.6, 0, TWO_PI * 3);
        let r = 130 * cos(3 * t);           // 3-petal rose
        let x = cx + r * cos(t);
        let y = cy + r * sin(t);
        pts.push({ x, y });
    }
    // Heart shape fill
    for (let i = 0; i < n * 0.4; i++) {
        let t = map(i, 0, n * 0.4, 0, TWO_PI);
        let sc = 10;
        let hx = cx + sc * 16 * pow(sin(t), 3);
        let hy = cy - sc * (13 * cos(t) - 5 * cos(2*t) - 2 * cos(3*t) - cos(4*t));
        pts.push({ x: hx, y: hy });
    }
    return shuffleArr(pts);
}

// Mode 1 – Large pixel-dot text like reference image (HAPPY NEW YEAR style)
function buildLiminalTargets(n) {
    let pts = [];

    const og = document.createElement('canvas');
    og.width = width; og.height = height;
    const octx = og.getContext('2d');
    octx.fillStyle = '#000';
    octx.fillRect(0, 0, width, height);
    octx.fillStyle = '#fff';

    // Line 1: "失序邊境" — large, fills width
    const line1 = "失序邊境";
    const size1 = Math.floor(width / 4.2);
    octx.font = `bold ${size1}px "Courier New", monospace`;
    const w1 = octx.measureText(line1).width;
    octx.fillText(line1, (width - w1) / 2, height * 0.28);

    // Line 2: "The Liminal Veil" — medium
    const line2 = "The Liminal Veil";
    const size2 = Math.floor(width / 8);
    octx.font = `bold ${size2}px "Courier New", monospace`;
    const w2 = octx.measureText(line2).width;
    octx.fillText(line2, (width - w2) / 2, height * 0.52);

    // Line 3: ".𖥔 ˖ .⋆" — small decorative
    const line3 = ".* \u2606 .+ \u2022 .*";
    const size3 = Math.floor(width / 14);
    octx.font = `${size3}px "Courier New", monospace`;
    const w3 = octx.measureText(line3).width;
    octx.fillText(line3, (width - w3) / 2, height * 0.66);

    // Sample pixels at tight grid for dense dots
    const imgData = octx.getImageData(0, 0, width, height);
    const pix = imgData.data;
    const step = 5; // tighter = more particles
    for (let x = 0; x < width; x += step) {
        for (let y = 0; y < height; y += step) {
            const idx = (x + y * width) * 4;
            if (pix[idx] > 128) {
                pts.push({ x, y });
            }
        }
    }

    // Shuffle then ensure exactly n points
    pts = shuffleArr(pts);
    while (pts.length < n) {
        pts = pts.concat(shuffleArr(pts.slice()).slice(0, n - pts.length));
    }
    return pts.slice(0, n);
}

function shuffleArr(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// ─── Spawn / respawn particles ────────────────────────────────────
function respawnParticles() {
    if (!targetsReady) return;
    particles = [];
    for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push(new Particle(random(width), random(height), i));
    }
}

// ─── MediaPipe ────────────────────────────────────────────────────
function initMediaPipe() {
    const handsModel = new Hands({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    handsModel.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    handsModel.onResults(results => {
        document.getElementById('loading-overlay').style.display = 'none';
        if (!targetsReady) buildTargets();   // build once canvas size is known

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            isHandVisible = true;
            const lm = results.multiHandLandmarks[0];
            const wrist = lm[0];
            // Mirror X for selfie view
            handX = (1 - wrist.x) * width;
            handY = wrist.y * height;

            // Fist detection: check all 4 finger tips vs their MCP joints
            // Finger tips: 8, 12, 16, 20 | MCP: 5, 9, 13, 17
            const tips  = [8, 12, 16, 20];
            const mcps  = [5,  9, 13, 17];
            let foldCount = 0;
            for (let i = 0; i < 4; i++) {
                if (lm[tips[i]].y > lm[mcps[i]].y) foldCount++;
            }
            isFist = foldCount >= 3;
        } else {
            isHandVisible = false;
            isFist = false;
        }
    });

    async function loop() {
        if (video.elt.readyState >= 2) {
            await handsModel.send({ image: video.elt });
        }
        requestAnimationFrame(loop);
    }
    loop();
}

// ─── p5 draw ─────────────────────────────────────────────────────
function draw() {
    background(0);

    // Camera feed with tinted overlay
    if (video && video.elt.readyState >= 2) {
        push();
        translate(width, 0); scale(-1, 1);
        tint(255, 200);
        image(video, 0, 0, width, height);
        noTint();
        const bg = MODE_INFO[mode].bg;
        fill(bg[0], bg[1], bg[2], bg[3]);
        noStroke();
        rect(0, 0, width, height);
        pop();
    }

    // Particles
    if (targetsReady) {
        const targets = mode === 0 ? roseTargets : liminalTargets;
        for (let i = 0; i < particles.length; i++) {
            particles[i].update(targets[i], isFist, handX, handY);
            particles[i].draw();
        }
    }

    // Gesture indicator
    if (isHandVisible) {
        const col = isFist ? color(255, 80, 80, 160) : color(0, 255, 200, 140);
        noFill(); stroke(col); strokeWeight(2);
        ellipse(handX, handY, isFist ? 60 : 90, isFist ? 60 : 90);
        noStroke();
    }
}

// ─── Particle Class ───────────────────────────────────────────────
class Particle {
    constructor(x, y, idx) {
        this.pos = createVector(x, y);
        this.vel = createVector(random(-2, 2), random(-2, 2));
        this.acc = createVector(0, 0);
        this.idx = idx;
        // Each particle has its own leisurely wander destination
        this.wanderTarget = createVector(random(width), random(height));
        this.wanderTimer = floor(random(60, 180));
    }

    update(target, fist, hx, hy) {
        this.acc.set(0, 0);

        if (fist) {
            // ── SEEK target with arrival easing ──────────────────
            const desired = p5.Vector.sub(createVector(target.x, target.y), this.pos);
            const d = desired.mag();
            const speed = d < 60 ? map(d, 0, 60, 0.5, 10) : 10;
            desired.setMag(speed);
            const steer = p5.Vector.sub(desired, this.vel);
            steer.limit(0.9);
            this.acc.add(steer);
        } else {
            // ── WANDER + FLEE hand ────────────────────────────────
            // Flee from hand
            // ── 跟其他粒子保持距離（簡化 Boids）──
            for (let other of particles) {
                if (other === this) continue;

                let d = dist(this.pos.x, this.pos.y, other.pos.x, other.pos.y);
    
                if (d < 20) {
        let push = p5.Vector.sub(this.pos, other.pos);
        push.setMag(0.5); // 推開強度
        this.acc.add(push);
    }
}
            if (isHandVisible) {
                const toHand = p5.Vector.sub(this.pos, createVector(hx, hy));
                const d = toHand.mag();
                if (d < 180) {
                    toHand.setMag(map(d, 0, 180, 12, 0));
                    this.acc.add(toHand);
                }
            }
            // Wander towards random point
            this.wanderTimer--;
            if (this.wanderTimer <= 0) {
                this.wanderTarget.set(random(width), random(height));
                this.wanderTimer = floor(random(80, 200));
            }
            const desired = p5.Vector.sub(this.wanderTarget, this.pos);
            desired.setMag(2);
            const steer = p5.Vector.sub(desired, this.vel);
            steer.limit(0.15);
            this.acc.add(steer);
        }

        this.vel.add(this.acc);
        this.vel.limit(fist ? 12 : 7);
        this.pos.add(this.vel);

        // Wrap edges
        if (this.pos.x < -5)      this.pos.x = width + 5;
        if (this.pos.x > width+5) this.pos.x = -5;
        if (this.pos.y < -5)      this.pos.y = height + 5;
        if (this.pos.y > height+5) this.pos.y = -5;
    }

    draw() {
        const info = MODE_INFO[mode];
        const speed = this.vel.mag();
        const alpha = map(speed, 0, 12, 160, 255);

        // Glow
        noStroke();
        fill(info.glow[0], info.glow[1], info.glow[2], 60);
        ellipse(this.pos.x, this.pos.y, 7, 7);

        // Core
        fill(info.core[0], info.core[1], info.core[2], alpha);
        ellipse(this.pos.x, this.pos.y, 2.5, 2.5);
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    // Rebuild targets for new canvas size
    if (targetsReady) {
        buildTargets();
    }
}
</script>

</body>
</html>
