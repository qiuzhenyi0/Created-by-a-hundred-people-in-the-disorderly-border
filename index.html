<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Gesture Particle Symphony</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { background: #000; overflow: hidden; width: 100%; height: 100%; }
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 10;
            padding: 16px 20px; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        #switch-btn {
            pointer-events: auto;
            padding: 10px 28px; border-radius: 30px; border: none;
            background: rgba(255,255,255,0.88);
            font-weight: 700; font-size: 15px; cursor: pointer;
            box-shadow: 0 2px 16px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
        }
        #mode-label {
            color: #fff; font-family: 'Courier New', monospace;
            font-size: 16px; text-shadow: 0 0 12px rgba(0,255,200,0.8);
            letter-spacing: 1px;
        }
        #gesture-hint {
            color: rgba(255,255,255,0.55); font-family: 'Courier New', monospace;
            font-size: 13px; font-style: italic;
        }
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: #fff; font-family: 'Courier New', monospace; gap: 16px;
        }
        #loading-overlay .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #0ff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="loading-overlay">
    <div class="spinner"></div>
    <div>жЁЎеһӢијүе…ҘдёӯпјҢи«ӢзЁҚеҖҷвҖҰ</div>
</div>

<div id="ui-layer">
    <button id="switch-btn" onclick="toggleMode()">еҲҮжҸӣжЁЎејҸ / Switch Mode</button>
    <div id="mode-label">вҠ№ зҺ«з‘°зҙӢжЁЈ Rose Pattern вҠ№</div>
    <div id="gesture-hint">вңҠ жҸЎжӢіиҒҡеҗҲ &nbsp;|&nbsp; рҹ–җ ејөжүӢж•Јй–Ӣ</div>
</div>

<script>
// в”Җв”Җв”Җ Global State в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let mode = 0;           // 0 = rose / 1 = liminal
let video;
let particles = [];
const NUM_PARTICLES = 900;

let handX = 0, handY = 0;
let isFist = false;
let isHandVisible = false;

let roseTargets = [];
let liminalTargets = [];
let targetsReady = false;

// в”Җв”Җв”Җ Mode Labels в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const MODE_INFO = [
    {
        label: "вҠ№ зҺ«з‘°зҙӢжЁЈ Rose Pattern вҠ№",
        hint:  "вңҠ жҸЎжӢіиҒҡеҗҲиҠұеһӢ | рҹ–җ ејөжүӢж•Јй–Ӣ",
        bg:    [150, 20, 50, 110],
        glow:  [255, 150, 180],
        core:  [255,  80, 120]
    },
    {
        label: "еӨұеәҸйӮҠеўғ .р–Ҙ” ЭҒЛ– The Liminal Veil .вӢҶ",
        hint:  "вңҠ жҸЎжӢіеҮқеӯ— | рҹ–җ ејөжүӢйҖғж•Ј",
        bg:    [0, 8, 20, 170],
        glow:  [0, 255, 220],
        core:  [200, 255, 255]
    }
];

// в”Җв”Җв”Җ Toggle Mode в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function toggleMode() {
    mode = (mode + 1) % 2;
    document.getElementById('mode-label').innerText = MODE_INFO[mode].label;
    document.getElementById('gesture-hint').innerText = MODE_INFO[mode].hint;
    respawnParticles();
}

// в”Җв”Җв”Җ p5 setup в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(RGB);

    video = createCapture(VIDEO, () => {
        initMediaPipe();
    });
    video.size(320, 240);
    video.hide();
}

// в”Җв”Җв”Җ Generate target points в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildTargets() {
    roseTargets   = buildRoseTargets(NUM_PARTICLES);
    liminalTargets = buildLiminalTargets(NUM_PARTICLES);
    targetsReady = true;
    respawnParticles();
}

// Mode 0 вҖ“ multi-petal rose using polar rose curve + heart overlay
function buildRoseTargets(n) {
    let pts = [];
    const cx = width / 2, cy = height / 2;

    // Rose curve (rhodonea) petals
    for (let i = 0; i < n * 0.6; i++) {
        let t = map(i, 0, n * 0.6, 0, TWO_PI * 3);
        let r = 130 * cos(3 * t);           // 3-petal rose
        let x = cx + r * cos(t);
        let y = cy + r * sin(t);
        pts.push({ x, y });
    }
    // Heart shape fill
    for (let i = 0; i < n * 0.4; i++) {
        let t = map(i, 0, n * 0.4, 0, TWO_PI);
        let sc = 10;
        let hx = cx + sc * 16 * pow(sin(t), 3);
        let hy = cy - sc * (13 * cos(t) - 5 * cos(2*t) - 2 * cos(3*t) - cos(4*t));
        pts.push({ x: hx, y: hy });
    }
    return shuffleArr(pts);
}

// Mode 1 вҖ“ ASCII art + text rendered via offscreen canvas
function buildLiminalTargets(n) {
    let pts = [];

    // --- ASCII art lines (the rose ASCII from the request) ---
    const ascii = [
        "вҠ№  вЈӨвЈ¶в ҝвў–вЈўвЈҙвЈ¶вЈҰвЈӨвЈ„",
        " вўёвЎҹвўҒвЈјв ҹвЈ©вўӨвЈӨв ӨвЈүв »вЈҮ  Л–",
        "вўҖвЈҫвЈҝвЎҲвЎҮвўёвЎҸвЈјвЈҮвЎ‘вўҖв ҮвЈёвўҶвўҝвўёвЈҝвЈҰ",
        "вЈёвЈҝвЈҝвЎҮв ҒвЈҖвЎҳв ҝв ҝв ҝвўЈвЎҫвўҸвЈјв ҲвЈјвЈҝвЈҝ",
        "вЈҝвЈҝвЈҝвЈ„в ҫвЈҝвЈҝвЈҝвЈ¶вЈ¶вЈӨвЈ¶вЈҝвЎҹв ҖвЈҝвЈҝв Ҹ",
        "в Ҳв ҷв ҝвЈҝвЈҰвЎҲвўҝвЈҝвЈҝвЈҝвЈҝвЎҝв ӢвЈ вЈҫвЈҝвЈ·",
        "  в »вЈҝвЈҝвЈҝв ҹв ү",
        "вҒәвҠ№   в »вЈҝвЈҝвЈҝв ҹв ү  вҠ№"
    ];

    // Render ASCII to offscreen canvas
    const og = document.createElement('canvas');
    og.width = width; og.height = height;
    const octx = og.getContext('2d');
    octx.fillStyle = '#000';
    octx.fillRect(0, 0, width, height);

    // --- ASCII block ---
    const fontSize = Math.min(width / 20, 22);
    octx.font = `${fontSize}px "Courier New", monospace`;
    octx.fillStyle = '#fff';
    const lineH = fontSize * 1.3;
    const totalH = ascii.length * lineH;
    const startY = height / 2 - totalH / 2 - 40;
    ascii.forEach((line, i) => {
        const tw = octx.measureText(line).width;
        octx.fillText(line, width/2 - tw/2, startY + i * lineH);
    });

    // --- "The Liminal Veil" text line ---
    const bigSize = Math.min(width / 14, 32);
    octx.font = `bold ${bigSize}px "Courier New", monospace`;
    octx.fillStyle = '#fff';
    const mainText = "The Liminal Veil";
    const tw2 = octx.measureText(mainText).width;
    octx.fillText(mainText, width/2 - tw2/2, startY + ascii.length * lineH + 30);

    // --- Sub text ---
    const subSize = Math.min(width / 22, 18);
    octx.font = `${subSize}px "Courier New", monospace`;
    const subText = "еӨұеәҸйӮҠеўғ .р–Ҙ” Л– .вӢҶ";
    const tw3 = octx.measureText(subText).width;
    octx.fillText(subText, width/2 - tw3/2, startY + ascii.length * lineH + 60);

    // Sample bright pixels
    const imgData = octx.getImageData(0, 0, width, height);
    const pix = imgData.data;
    const step = 4;
    for (let x = 0; x < width; x += step) {
        for (let y = 0; y < height; y += step) {
            const idx = (x + y * width) * 4;
            if (pix[idx] > 100) {
                pts.push({ x, y });
            }
        }
    }

    // Ensure exactly n targets by repeating or trimming
    pts = shuffleArr(pts);
    while (pts.length < n) {
        pts = pts.concat(pts.slice(0, n - pts.length));
    }
    return pts.slice(0, n);
}

function shuffleArr(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// в”Җв”Җв”Җ Spawn / respawn particles в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function respawnParticles() {
    if (!targetsReady) return;
    particles = [];
    for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push(new Particle(random(width), random(height), i));
    }
}

// в”Җв”Җв”Җ MediaPipe в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function initMediaPipe() {
    const handsModel = new Hands({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    handsModel.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    handsModel.onResults(results => {
        document.getElementById('loading-overlay').style.display = 'none';
        if (!targetsReady) buildTargets();   // build once canvas size is known

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            isHandVisible = true;
            const lm = results.multiHandLandmarks[0];
            const wrist = lm[0];
            // Mirror X for selfie view
            handX = (1 - wrist.x) * width;
            handY = wrist.y * height;

            // Fist detection: check all 4 finger tips vs their MCP joints
            // Finger tips: 8, 12, 16, 20 | MCP: 5, 9, 13, 17
            const tips  = [8, 12, 16, 20];
            const mcps  = [5,  9, 13, 17];
            let foldCount = 0;
            for (let i = 0; i < 4; i++) {
                if (lm[tips[i]].y > lm[mcps[i]].y) foldCount++;
            }
            isFist = foldCount >= 3;
        } else {
            isHandVisible = false;
            isFist = false;
        }
    });

    async function loop() {
        if (video.elt.readyState >= 2) {
            await handsModel.send({ image: video.elt });
        }
        requestAnimationFrame(loop);
    }
    loop();
}

// в”Җв”Җв”Җ p5 draw в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function draw() {
    background(0);

    // Camera feed with tinted overlay
    if (video && video.elt.readyState >= 2) {
        push();
        translate(width, 0); scale(-1, 1);
        tint(255, 200);
        image(video, 0, 0, width, height);
        noTint();
        const bg = MODE_INFO[mode].bg;
        fill(bg[0], bg[1], bg[2], bg[3]);
        noStroke();
        rect(0, 0, width, height);
        pop();
    }

    // Particles
    if (targetsReady) {
        const targets = mode === 0 ? roseTargets : liminalTargets;
        for (let i = 0; i < particles.length; i++) {
            particles[i].update(targets[i], isFist, handX, handY);
            particles[i].draw();
        }
    }

    // Gesture indicator
    if (isHandVisible) {
        const col = isFist ? color(255, 80, 80, 160) : color(0, 255, 200, 140);
        noFill(); stroke(col); strokeWeight(2);
        ellipse(handX, handY, isFist ? 60 : 90, isFist ? 60 : 90);
        noStroke();
    }
}

// в”Җв”Җв”Җ Particle Class в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class Particle {
    constructor(x, y, idx) {
        this.pos = createVector(x, y);
        this.vel = createVector(random(-2, 2), random(-2, 2));
        this.acc = createVector(0, 0);
        this.idx = idx;
        // Each particle has its own leisurely wander destination
        this.wanderTarget = createVector(random(width), random(height));
        this.wanderTimer = floor(random(60, 180));
    }

    update(target, fist, hx, hy) {
        this.acc.set(0, 0);

        if (fist) {
            // в”Җв”Җ SEEK target with arrival easing в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const desired = p5.Vector.sub(createVector(target.x, target.y), this.pos);
            const d = desired.mag();
            const speed = d < 60 ? map(d, 0, 60, 0.5, 10) : 10;
            desired.setMag(speed);
            const steer = p5.Vector.sub(desired, this.vel);
            steer.limit(0.9);
            this.acc.add(steer);
        } else {
            // в”Җв”Җ WANDER + FLEE hand в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            // Flee from hand
            if (isHandVisible) {
                const toHand = p5.Vector.sub(this.pos, createVector(hx, hy));
                const d = toHand.mag();
                if (d < 180) {
                    toHand.setMag(map(d, 0, 180, 12, 0));
                    this.acc.add(toHand);
                }
            }
            // Wander towards random point
            this.wanderTimer--;
            if (this.wanderTimer <= 0) {
                this.wanderTarget.set(random(width), random(height));
                this.wanderTimer = floor(random(80, 200));
            }
            const desired = p5.Vector.sub(this.wanderTarget, this.pos);
            desired.setMag(2);
            const steer = p5.Vector.sub(desired, this.vel);
            steer.limit(0.15);
            this.acc.add(steer);
        }

        this.vel.add(this.acc);
        this.vel.limit(fist ? 12 : 7);
        this.pos.add(this.vel);

        // Wrap edges
        if (this.pos.x < -5)      this.pos.x = width + 5;
        if (this.pos.x > width+5) this.pos.x = -5;
        if (this.pos.y < -5)      this.pos.y = height + 5;
        if (this.pos.y > height+5) this.pos.y = -5;
    }

    draw() {
        const info = MODE_INFO[mode];
        const speed = this.vel.mag();
        const alpha = map(speed, 0, 12, 160, 255);

        // Glow
        noStroke();
        fill(info.glow[0], info.glow[1], info.glow[2], 60);
        ellipse(this.pos.x, this.pos.y, 7, 7);

        // Core
        fill(info.core[0], info.core[1], info.core[2], alpha);
        ellipse(this.pos.x, this.pos.y, 2.5, 2.5);
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    // Rebuild targets for new canvas size
    if (targetsReady) {
        buildTargets();
    }
}
</script>
</body>
</html>
